<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="Calibri, Helvetica, Arial, sans-serif">
  <!-- Title -->
  <text x="600" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#21295C">Vintage-keyed splits across 26 years of macro regimes</text>
  <text x="600" y="58" text-anchor="middle" font-size="14" fill="#6B7B8C">A loan's split is decided by its origination year — never by random row shuffle</text>

  <!-- Timeline ruler -->
  <line x1="80" y1="190" x2="1140" y2="190" stroke="#21295C" stroke-width="2"/>

  <!-- Year labels -->
  <g font-size="11" fill="#21295C" text-anchor="middle">
    <line x1="80"   y1="186" x2="80"   y2="194" stroke="#21295C"/><text x="80"   y="210">2000</text>
    <line x1="244"  y1="186" x2="244"  y2="194" stroke="#21295C"/><text x="244"  y="210">2004</text>
    <line x1="408"  y1="186" x2="408"  y2="194" stroke="#21295C"/><text x="408"  y="210">2008</text>
    <line x1="572"  y1="186" x2="572"  y2="194" stroke="#21295C"/><text x="572"  y="210">2012</text>
    <line x1="736"  y1="186" x2="736"  y2="194" stroke="#21295C"/><text x="736"  y="210">2016</text>
    <line x1="900"  y1="186" x2="900"  y2="194" stroke="#21295C"/><text x="900"  y="210">2020</text>
    <line x1="1064" y1="186" x2="1064" y2="194" stroke="#21295C"/><text x="1064" y="210">2024</text>
  </g>
  <!-- 41 px per year, 80 = year 2000 -->

  <!-- Train band: 2000-2015 = x 80 .. 80+16*41 = 736 -->
  <rect x="80" y="100" width="656" height="80" rx="6" fill="#21295C"/>
  <text x="408" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="2">TRAIN</text>
  <text x="408" y="152" text-anchor="middle" font-size="12" fill="#CADCFC">2000 – 2015 · 16 vintages</text>
  <text x="408" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#F9E795">≈ 34.8M loans</text>

  <!-- Val band: 2016-2017 = 736 .. 818 -->
  <rect x="736" y="100" width="82" height="80" rx="6" fill="#1C7293"/>
  <text x="777" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">VAL</text>
  <text x="777" y="148" text-anchor="middle" font-size="11" fill="#CADCFC">2016–2017</text>
  <text x="777" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#F9E795">4.34M</text>

  <!-- Test band: 2018-2019 = 818 .. 900 -->
  <rect x="818" y="100" width="82" height="80" rx="6" fill="#065A82"/>
  <text x="859" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="1">TEST</text>
  <text x="859" y="148" text-anchor="middle" font-size="11" fill="#CADCFC">2018–2019</text>
  <text x="859" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#F9E795">3.95M</text>

  <!-- Stress band: 2020 = 900 .. 941 -->
  <rect x="900" y="100" width="41" height="80" rx="6" fill="#B85042"/>
  <text x="920.5" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1">STRESS</text>
  <text x="920.5" y="148" text-anchor="middle" font-size="10" fill="#FCF6F5">'20</text>
  <text x="920.5" y="166" text-anchor="middle" font-size="10" font-weight="700" fill="#F9E795">≈1.5M</text>

  <!-- Hold band: 2021-2024Q2 (still settling) = 941 .. 1085  -->
  <rect x="941" y="100" width="144" height="80" rx="6" fill="#CADCFC" stroke="#6B7B8C" stroke-width="1"/>
  <text x="1013" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#21295C" letter-spacing="1">HOLD-OUT</text>
  <text x="1013" y="156" text-anchor="middle" font-size="11" fill="#21295C">'21 – '24Q2</text>

  <!-- Excluded: 2024Q3+ = 1085 .. 1140 -->
  <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
    <rect width="6" height="6" fill="#FFFFFF"/>
    <line x1="0" y1="0" x2="0" y2="6" stroke="#6B7B8C" stroke-width="1.5"/>
  </pattern>
  <rect x="1085" y="100" width="55" height="80" rx="6" fill="url(#hatch)" stroke="#6B7B8C" stroke-width="1"/>
  <text x="1112.5" y="138" text-anchor="middle" font-size="10" font-weight="700" fill="#6B7B8C" letter-spacing="1">SKIP</text>
  <text x="1112.5" y="158" text-anchor="middle" font-size="10" fill="#6B7B8C">immature</text>

  <!-- Macro regime annotations below -->
  <g font-size="11" fill="#6B7B8C" font-style="italic" text-anchor="middle">
    <text x="244" y="248">2008 financial crisis</text>
    <line x1="380" y1="240" x2="408" y2="200" stroke="#6B7B8C" stroke-width="1" stroke-dasharray="2,2"/>

    <text x="572" y="248">post-crisis calm</text>
    <line x1="572" y1="240" x2="572" y2="200" stroke="#6B7B8C" stroke-width="1" stroke-dasharray="2,2"/>

    <text x="900" y="248">COVID forbearance + refi wave</text>
    <line x1="900" y1="240" x2="900" y2="200" stroke="#6B7B8C" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <!-- Bottom note -->
  <rect x="80" y="280" width="1060" height="60" rx="6" fill="#F2F4F7"/>
  <text x="100" y="304" font-size="13" font-weight="700" fill="#21295C">Why this matters:</text>
  <text x="100" y="324" font-size="12" fill="#21295C">delinquency prevalence ranges from 0.14% (2012) to 7%+ (late 2007); prepayment ranges from &lt;5% to 46%+. The split policy</text>
  <text x="100" y="338" font-size="12" fill="#21295C">preserves this drift instead of hiding it — the test cohort is genuinely out-of-time, not a random row sample of the same vintages.</text>
</svg>
